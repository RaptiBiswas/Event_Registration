<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Yourself</title>
    <link rel="stylesheet" href="stylereg.css">
    </head>
    <body>
        <div class="box">
            <div class="tittle">
                <label>Registration Form</label>
            </div>
            
            <form action="#">
                <div class="userdetails">
                <div class="inputBox">
                <span class="details">Name:</span>
                <input type="text" placeholder="Enter your full name" required>
                </div>
                <div class="inputBox">
                <span class="details">Email:</span>
                <input type="email" placeholder="Enter your email address" required>
                </div>
                <div class="inputBox">
                <span class="details">Phone Number:</span>
                <input type="text" placeholder="Enter your phone number" required>
                </div>
                <div class="inputBox">
                <span class="details">Alternate Phone Number:</span>
                <input type="text" placeholder="Alternate phone number" required>
                </div>
                </div>
                <div class="selection">
                <div class="inputBox">
                <span class="details">Gender</span><br>
                <select name="gender" id="">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Prefer not to Say</option>
                </select>
                </div>
                <div class="inputBox">
                <span class="details">Dance Genre in which you want to compete</span><br>
                <select name="genre" id="">
                    <option>Ballet</option>
                    <option>Modern and Contemporary Dance</option>
                    <option>Hip-hop and Street Dance</option>
                    <option>Ballroom and Social Dance</option>
                    <option>Traditional and Folk Dances</option>
                </select>
                </div>
                <div class="inputBox">
                <span class="details">Category</span><br>
                <select name="cat" id="">
                    <option>Solo</option>
                    <option>Duo</option>
                    <option>Team</option>
                </select> 
                </div> 
                </div>
                <div class="button">
                    <input type="submit" value="Register">
                </div>
                
            </form>
        
        </div>
    
    </body>
